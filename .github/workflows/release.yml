name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: blocknet
            asset: blocknet-amd64-linux
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            binary: blocknet
            asset: blocknet-arm64-linux
          - os: macos-14
            goos: darwin
            goarch: arm64
            binary: blocknet
            asset: blocknet-arm64-macos
          - os: macos-14
            goos: darwin
            goarch: amd64
            binary: blocknet
            asset: blocknet-amd64-macos
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: blocknet.exe
            asset: blocknet-amd64-windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ${{ matrix.binary }} .

      - name: Package (unix)
        if: matrix.goos != 'windows'
        run: zip -q ${{ matrix.asset }}.zip ${{ matrix.binary }}

      - name: Package (windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ${{ matrix.asset }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: releases
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd releases
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: releases/*
          draft: false
          prerelease: false
